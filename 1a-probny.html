    { question: "32. Do kategorii przedmiotów zabronionych do wnoszenia do strefy zastrzeżonej w zaopatrzeniu portu lotniczego zaliczamy:", options: ["a) wiertarkę z wiertłami","b) proce","c) pistolety sygnałowe","d) śrubokręty o długości trzonka 5 cm","e) noże o długości ostrza 7 cm","f) tasery"], correct: ["b) proce","c) pistolety sygnałowe","f) tasery"] },
    { question: "33. Ręczny wykrywacz metali:", options: ["a) wykrywa przedmioty metalowe żelazne i nieżelazne","b) jest podstawową metodą kontroli bezpieczeństwa osób","c) pomaga w wykrywaniu materiałów wybuchowych","d) nie zastępuje kontroli manualnej","e) posiada wskaźnik wizualny sygnalizujący, że urządzenie działa","f) jest metodą kontroli bezpieczeństwa zgodnie z Rozp. 2015/1998"], correct: ["a) wykrywa przedmioty metalowe żelazne i nieżelazne","d) nie zastępuje kontroli manualnej","e) posiada wskaźnik wizualny sygnalizujący, że urządzenie działa"] },

    { question: "35. Funkcja TIP w urządzeniu rentgenowskim:", options: ["a) zwiększa kontrast przedmiotów o małej ilości absorpcji","b) zwiększa kontrast przedmiotów zaciemnionych","c) wykrywa zagrożenia na wyświetlanym obrazie","d) identyfikuje wirtualne zagrożenia na wyświetlanym obrazie","e) żadna odpowiedź nie jest prawidłowa"], correct: ["e) żadna odpowiedź nie jest prawidłowa"] },
    { question: "36. Na lotnisku, na którym nie funkcjonuje lotnicze przejście graniczne za nadzór nad odprawioną bronią odpowiedzialna jest:", options: ["a) Służba Ochrony Lotniska","b) Straż Graniczna","c) Policja","d) Służba Celno-Skarbowa","e) Specjalistyczna Uzbrojona Formacja Ochronna","f) Przewoźnik lotniczy, którego samolotem będzie przewożona broń"], correct: ["a) Służba Ochrony Lotniska"] },

    { question: "39. Do kategorii przedmiotów zabronionych do wnoszenia do strefy zastrzeżonej przez osoby niebędące pasażerami zaliczamy:", options: ["a) noże kuchenne","b) wiertarki i wiertła","c) noże o długości ostrza 5 cm","d) pałki teleskopowe","e) kajdanki","f) płyny do dezynfekcji o stężeniu alkoholu poniżej 70%"], correct: ["d) pałki teleskopowe","e) kajdanki"] },
    { question: "40. Do metod kontroli bezpieczeństwa ładunku i poczty zaliczamy:", options: ["a) urządzenie do wykrywania metali","b) psa do wykrywania materiałów wybuchowych w połączeniu z kontrolą wzrokową","c) urządzenie do wykrywania śladowych ilości materiałów wybuchowych w połączeniu z kontrolą wzrokową","d) urządzenie do wykrywania materiałów wybuchowych w butach","e) urządzenie do wykrywania oparów materiałów wybuchowych","f) psa do wykrywania materiałów wybuchowych w połączeniu z kontrolą manualną"], correct: ["a) urządzenie do wykrywania metali","e) urządzenie do wykrywania oparów materiałów wybuchowych"] }
];

let currentRound = questions.slice();
let incorrect = [];
let currentIndex = 0;
let roundNumber = 1;

const qText      = document.querySelector('.question-text');
const multiHint  = document.querySelector('.multi-hint');
const optionsDiv = document.querySelector('.options');
const resultDiv  = document.querySelector('.result');
const correctDiv = document.querySelector('.correct-answer');
const checkBtn   = document.getElementById('check-btn');
const nextBtn    = document.getElementById('next-btn');
const progress   = document.querySelector('.progress');

function renderQuestion() {
    if (currentIndex >= currentRound.length) {
        if (incorrect.length === 0) {
            qText.textContent = "Koniec! Wszystkie pytania zrobione poprawnie w tej sesji 🎉";
            optionsDiv.innerHTML = multiHint.textContent = "";
            checkBtn.style.display = nextBtn.style.display = "none";
            resultDiv.style.display = correctDiv.style.display = "none";
            progress.textContent = "";
            return;
        }
        currentRound = incorrect.slice();
        incorrect = [];
        currentIndex = 0;
        roundNumber++;
        renderQuestion();
        return;
    }

    const q = currentRound[currentIndex];
    qText.textContent = q.question;
    optionsDiv.innerHTML = "";

    const isMulti = q.correct.length > 1;
    multiHint.textContent = isMulti ? "Można zaznaczyć więcej niż jedną odpowiedź (klikaj, by zaznaczyć / odznaczyć)" : "";

    q.options.forEach(opt => {
        const div = document.createElement('div');
        div.classList.add('option');
        div.textContent = opt;
        div.dataset.value = opt;

        div.addEventListener('click', () => {
            div.classList.toggle('selected');
        });

        optionsDiv.appendChild(div);
    });

    resultDiv.style.display = correctDiv.style.display = "none";
    nextBtn.style.display = "none";
    checkBtn.style.display = "inline-block";

    progress.textContent = `Runda ${roundNumber} • Pytanie ${currentIndex + 1} / ${currentRound.length}`;
}

function checkAnswer() {
    const selected = Array.from(document.querySelectorAll('.option.selected'))
                         .map(el => el.dataset.value);

    if (selected.length === 0) {
        alert("Zaznacz przynajmniej jedną odpowiedź.");
        return;
    }

    const correctSorted = [...currentRound[currentIndex].correct].sort();
    const selectedSorted = [...selected].sort();

    const isCorrect = correctSorted.length === selectedSorted.length &&
                      correctSorted.every((v, i) => v === selectedSorted[i]);

    resultDiv.className = "result " + (isCorrect ? "correct" : "incorrect");
    resultDiv.textContent = isCorrect ? "DOBRZE" : "ŹLE";
    resultDiv.style.display = "block";

    if (!isCorrect) {
        correctDiv.textContent = "Prawidłowe: " + currentRound[currentIndex].correct.join("\n");
        correctDiv.style.display = "block";
        incorrect.push(currentRound[currentIndex]);
    }

    checkBtn.style.display = "none";
    nextBtn.style.display = "inline-block";
}

checkBtn.onclick = checkAnswer;
nextBtn.onclick = () => { currentIndex++; renderQuestion(); };

renderQuestion();
</script>
