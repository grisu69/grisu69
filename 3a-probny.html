let current = 0;

function loadQuestion() {
  const q = questions[current];
  if (!q) {
    document.getElementById("questionArea").innerHTML = '<h2 style="color:#166534; text-align:center;">Koniec testu!</h2>';
    document.getElementById("btnCheck").classList.add("hidden");
    document.getElementById("btnNext").classList.add("hidden");
    document.getElementById("btnFinish").classList.remove("hidden");
    return;
  }

  document.getElementById("stats").textContent = `Pytanie ${q.nr} z ${questions.length}`;

  document.getElementById("questionArea").innerHTML = `
    <div class="q-title">Pytanie ${q.nr}.</div>
    ${q.q.replace(/\n/g, '<br>')}
  `;

  document.getElementById("feedback").classList.add("hidden");
  document.getElementById("btnCheck").classList.remove("hidden");
  document.getElementById("btnNext").classList.add("hidden");

  setTimeout(makeOptionsClickable, 150);
}

function makeOptionsClickable() {
  const container = document.getElementById("questionArea");
  const nodes = Array.from(container.childNodes);
  let newHTML = '';

  nodes.forEach(node => {
    if (node.nodeType === 3) { // tekst
      const text = node.textContent.trim();
      if (/^[a-f]\)/.test(text)) {
        newHTML += `<div class="option" data-letter="${text[0]}">${text}</div>`;
      } else {
        newHTML += text;
      }
    } else if (node.nodeType === 1 && node.tagName !== 'BR') {
      newHTML += node.outerHTML;
    }
  });

  container.innerHTML = newHTML;

  document.querySelectorAll('.option').forEach(opt => {
    opt.addEventListener('click', () => opt.classList.toggle('selected'));
  });
}

function checkAnswer() {
  const selected = Array.from(document.querySelectorAll('.option.selected'))
    .map(el => el.dataset.letter);

  const correct = questions[current].ans;
  const isCorrect = selected.length === correct.length &&
                    correct.every(l => selected.includes(l));

  const fb = document.getElementById("feedback");
  fb.classList.remove("hidden");
  fb.classList.toggle("correct", isCorrect);
  fb.classList.toggle("wrong", !isCorrect);
  fb.innerHTML = isCorrect ? "DOBRZE!" : "ŹLE";

  if (!isCorrect) {
    fb.innerHTML += `<div class="correct-ans">Poprawne: ${correct.join(", ")}</div>`;
  }

  document.getElementById("btnCheck").classList.add("hidden");
  document.getElementById("btnNext").classList.remove("hidden");
}

function nextQuestion() {
  current++;
  loadQuestion();
}

loadQuestion();
</script>
