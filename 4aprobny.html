let mode="learning", pool=[...Array(40).keys()], wrong=[], i=0, selected=[], score=0;

function show(){
document.getElementById("mode").innerText=mode==="learning"?"TRYB NAUKI":"EGZAMIN";

document.getElementById("question").innerText=q.q;
let a=document.getElementById("answers"); a.innerHTML=""; selected=[];
q.a.forEach((t,idx)=>{
let d=document.createElement("div");
d.className="answer";
d.innerText=t;
d.onclick=()=>{d.classList.toggle("selected"); selected.includes(idx)?selected=selected.filter(x=>x!=idx):selected.push(idx);};
a.appendChild(d);
});
document.getElementById("msg").innerText="";
}

function check(){
let q=Q[pool[i]];
let ok=JSON.stringify([...selected].sort())===JSON.stringify([...q.c].sort());
let divs=document.querySelectorAll(".answer");
if(ok){document.getElementById("msg").innerHTML="<span style='color:green'>DOBRZE</span>"; if(mode==="exam")score++;}
else{document.getElementById("msg").innerHTML="<span style='color:red'>ŹLE</span>"; wrong.push(pool[i]); q.c.forEach(i=>divs[i].classList.add("correct")); selected.forEach(i=>{if(!q.c.includes(i))divs[i].classList.add("wrong");});}
}

function next(){
i++;
if(i>=pool.length){
if(mode==="learning"){pool=[...new Set(wrong)];wrong=[];i=0;if(pool.length==0){mode="exam";pool=[...Array(40).keys()];score=0;}}
else{alert("WYNIK: "+score+"/40 = "+Math.round(score/40*100)+"%");return;}
}
show();
}
