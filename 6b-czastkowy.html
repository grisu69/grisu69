let index = 0;
let wrong = [];

function load(){
document.getElementById("question").innerText = questions[index].q;
let html="";
questions[index].a.forEach((t,i)=>{
html += `<div class="answer" onclick="toggle(this)" data-val="${['a','b','c','d'][i]}">${t}</div>`;
});
document.getElementById("answers").innerHTML = html;
document.getElementById("result").innerHTML = "";
}

function toggle(el){
el.classList.toggle("selected");
}

function check(){
let sel = [...document.querySelectorAll(".selected")].map(e=>e.dataset.val).sort();
let ok = [...questions[index].ok].sort();
let r = document.getElementById("result");
if(JSON.stringify(sel) === JSON.stringify(ok)){
r.innerHTML = "<span class='correct'>DOBRZE</span>";
}else{
r.innerHTML = "<span class='wrong'>ŹLE</span><br>Poprawne: " + ok.join(", ");
if(!wrong.includes(index)) wrong.push(index);
}
}

function next(){
index++;
if(index >= questions.length){
if(wrong.length > 0){
alert("Powtarzamy błędne pytania");
questions.splice(0, questions.length, ...wrong.map(i => questions[i]));
wrong = [];
index = 0;
}else{
alert("KONIEC TESTU – WSZYSTKO ZALICZONE");
index = 0;
}
}
load();
}
