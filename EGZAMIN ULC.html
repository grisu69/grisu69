const multiHint  = document.querySelector('.multi-hint');
const optionsDiv = document.querySelector('.options');
const resultDiv  = document.querySelector('.result');
const correctDiv = document.querySelector('.correct-answer');
const checkBtn   = document.getElementById('check-btn');
const nextBtn    = document.getElementById('next-btn');
const progress   = document.querySelector('.progress');

function renderQuestion() {
    if (currentIndex >= currentRound.length) {
        if (incorrect.length === 0) {
            qText.textContent = "Koniec! Wszystkie pytania zrobione poprawnie w tej sesji 🎉";
            optionsDiv.innerHTML = multiHint.textContent = "";
            checkBtn.style.display = nextBtn.style.display = "none";
            resultDiv.style.display = correctDiv.style.display = "none";
            progress.textContent = "";
            return;
        }
        currentRound = incorrect.slice();
        incorrect = [];
        currentIndex = 0;
        roundNumber++;
        renderQuestion();
        return;
    }

    const q = currentRound[currentIndex];
    qText.textContent = q.question;
    optionsDiv.innerHTML = "";

    const isMulti = q.correct.length > 1;
    multiHint.textContent = isMulti ? "Można zaznaczyć więcej niż jedną odpowiedź (klikaj, by zaznaczyć / odznaczyć)" : "";

    q.options.forEach(opt => {
        const div = document.createElement('div');
        div.classList.add('option');
        div.textContent = opt;
        div.dataset.value = opt;

        div.addEventListener('click', () => {
            div.classList.toggle('selected');
        });

        optionsDiv.appendChild(div);
    });

    resultDiv.style.display = correctDiv.style.display = "none";
    nextBtn.style.display = "none";
    checkBtn.style.display = "inline-block";

    progress.textContent = `Runda ${roundNumber} • Pytanie ${currentIndex + 1} / ${currentRound.length}`;
}

function checkAnswer() {
    const selected = Array.from(document.querySelectorAll('.option.selected'))
                         .map(el => el.dataset.value);

    if (selected.length === 0) {
        alert("Zaznacz przynajmniej jedną odpowiedź.");
        return;
    }

    const correctSorted = [...currentRound[currentIndex].correct].sort();
    const selectedSorted = [...selected].sort();

    const isCorrect = correctSorted.length === selectedSorted.length &&
                      correctSorted.every((v, i) => v === selectedSorted[i]);

    resultDiv.className = "result " + (isCorrect ? "correct" : "incorrect");
    resultDiv.textContent = isCorrect ? "DOBRZE" : "ŹLE";
    resultDiv.style.display = "block";

    if (!isCorrect) {
        correctDiv.textContent = "Prawidłowe: " + currentRound[currentIndex].correct.join("\n");
        correctDiv.style.display = "block";
        incorrect.push(currentRound[currentIndex]);
    }

    checkBtn.style.display = "none";
    nextBtn.style.display = "inline-block";
}

checkBtn.onclick = checkAnswer;
nextBtn.onclick = () => { currentIndex++; renderQuestion(); };

renderQuestion();
</script>
