  {q:"184. Podporucznik Straży Granicznej to stopień służbowy należący do korpusu:", a:["szeregowych;","podoficerów;","chorążych;","oficerów;"], c:["D"]},
  {q:"185. Terenowymi organami Straży Granicznej są:", a:["komendanci oddziałów, placówek i dywizjonów Straży Granicznej;","komendanci ośrodków szkolenia i Wyższej Szkoły Straży Granicznej;","komendanci drogowych i osobowych przejść granicznych;","dowódcy jednostek pływających Straży Granicznej;"], c:["A"]},
  {q:"186. Straż Graniczna, jako jednolita, umundurowana i uzbrojona formacja została powołana ustawą z dnia:", a:["12 października 1991 r.;","12 października 1990 r.;","16 maja 1991 r.;","31 maja 1995 r.;"], c:["B"]},
  {q:"187. Nadzór nad działalnością sądów powszechnych i wojskowych w zakresie orzekania sprawuje:", a:["Sąd Najwyższy;","Trybunał Stanu;","Naczelny Sąd Administracyjny;","Prezes NIK;"], c:["A"]},
  {q:"188. Starosta kieruje:", a:["gminą;","urzędem;","powiatem;","województwem;"], c:["C"]},
  {q:"189. Osoba, która opuszcza miejsce zamieszkania w celu osiedlenia się w innym kraju to:", a:["uchodźca;","emigrant;","azylant;","imigrant;"], c:["B"]},
  {q:"190. Kadencja wójta, burmistrza i prezydenta miasta trwa:", a:["5 lat;","4 lata;","6 lat;","3 lata;"], c:["A"]},
  {q:"191. Straż Graniczna to formacja typu:", a:["wojskowego;","policyjnego;","zmilitaryzowanego;","społecznego;"], c:["B"]},
  {q:"192. Straż Graniczna jako formacja podlega:", a:["Ministerstwu Obrony Narodowej;","Ministerstwu Spraw Wewnętrznych i Administracji;","Prezesowi Rady Ministrów;","Prezydentowi;"], c:["B"]},
  {q:"193. Zgodnie z Ustawą o Straży Granicznej, Straż Graniczna to formacja:", a:["jednolita, umundurowana, uzbrojona;","umundurowana, skoszarowana, uzbrojona;","militarna, wyspecjalizowana, zmotoryzowana;","umundurowana, skoszarowana, wyspecjalizowana;"], c:["A"]},
  {q:"194. Granica rzeczna z Białorusią i Ukrainą przebiega na:", a:["Bugu;","Warcie;","Wiśle;","Odrze;"], c:["A"]},
  {q:"195. Ministrowi Spraw Wewnętrznych i Administracji podlegają:", a:["Komendant Główny Policji;","Komendant Główny Straży Granicznej;","Komendant Służby Ochrony Państwa;","wszystkie ww. odpowiedzi są prawidłowe;"], c:["D"]},
  {q:"196. Cudzoziemiec w świetle prawa polskiego, to:", a:["osoba, która nie mieszka w Polsce;","osoba, która przekroczyła granicę danego państwa;","osoba, która nie posiada obywatelstwa polskiego;","osoba, która migruje;"], c:["C"]},
  {q:"197. Ile oddziałów znajduje się w strukturze Straży Granicznej?", a:["7;","9;","11;","12;"], c:["B"]},
  {q:"198. W jakich sytuacjach funkcjonariusz Straży Granicznej może użyć środków przymusu bezpośredniego?", a:["tylko na granicy zewnętrznej;","w każdym przypadku nieposłuszeństwa;","w sytuacji zagrożenia zdrowia, życia lub naruszenia porządku prawnego;","tylko za zgodą sądu;"], c:["C"]},
  {q:"199. Co obejmuje kontrola graniczna?", a:["tylko sprawdzenie paszportu;","ocenę dokumentów, osób i pojazdów przekraczających granicę;","sprawdzanie miejsc zamieszkania cudzoziemców;","weryfikację poziomu języka polskiego;"], c:["B"]},
  {q:"200. W jaki sposób Straż Graniczna przeciwdziała nielegalnej migracji?", a:["poprzez działania tylko w urzędach;","poprzez wsparcie służb celnych;","poprzez patrole, monitoring granic i kontrole legalności pobytu;","poprzez działania wyłącznie prewencyjne;"], c:["C"]}
];

// losowa kolejność pytań
questions.sort(()=>Math.random()-0.5);

let current=0, results=[], selected=[], phase="answer";

const qEl=document.getElementById("question");
const aEl=document.getElementById("answers");
const fb=document.getElementById("feedback");
const btn=document.getElementById("mainBtn");
const prog=document.getElementById("progress");
const summary=document.getElementById("summary");

function load(){
  selected=[];
  fb.innerHTML="";
  aEl.innerHTML="";
  btn.textContent="SPRAWDŹ";
  phase="answer";
  prog.textContent=`Pytanie ${current+1} / ${questions.length}`;
  const q=questions[current];
  qEl.textContent=q.q;
  q.a.forEach((t,i)=>{
    const l=String.fromCharCode(65+i);
    const d=document.createElement("div");
    d.className="answer";
    d.textContent=l+") "+t;
    d.onclick=()=>toggle(d,l);
    aEl.appendChild(d);
  });
}

function toggle(el,l){
  if(phase!=="answer") return;
  if(el.classList.contains("sel")){
    el.classList.remove("sel");
    selected=selected.filter(x=>x!==l);
  }else{
    el.classList.add("sel");
    selected.push(l);
  }
}

btn.onclick=()=>{
  const q=questions[current];
  if(phase==="answer"){
    const ok=selected.sort().join()===[...q.c].sort().join();
    results.push({q:q.q,a:q.a,sel:[...selected],cor:q.c});
    if(ok) fb.innerHTML="<div class='good'>DOBRZE</div>";
    else{
      let h="<div class='bad'>ŹLE</div>";
      q.a.forEach((t,i)=>{
        const l=String.fromCharCode(65+i);
        if(q.c.includes(l)) h+=`<div class='good'>${t}</div>`;
        else if(selected.includes(l)) h+=`<div class='bad'>${t}</div>`;
      });
      fb.innerHTML=h;
    }
    btn.textContent="NASTĘPNE PYTANIE";
    phase="feedback";
  } else {
    current++;
    if(current<questions.length) load();
    else showSummary();
  }
}

function showSummary(){
  document.getElementById("app").style.display="none";
  let good=0;
  results.forEach(r=>{if(r.sel.sort().join()==r.cor.sort().join())good++;});
  let html=`<h2>Wynik: ${(good/results.length*100).toFixed(1)}%</h2>`;
  results.forEach(r=>{
    html+=`<p>${r.q}</p>`;
    r.a.forEach((t,i)=>{
      const l=String.fromCharCode(65+i);
      let cls="";
      if(r.cor.includes(l)) cls="good";
      else if(r.sel.includes(l)) cls="bad";
      html+=`<div class='${cls}'>${t}</div>`;
    });
  });
  summary.innerHTML=html;
  summary.classList.remove("hidden");
}

load();
</script>
